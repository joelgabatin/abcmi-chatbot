version: "3.1"

# ── Forms ──────────────────────────────────────────────────────────────────────
forms:
  prayer_form:
    required_slots:
      - prayer_name
      - prayer_phone
      - prayer_address
      - prayer_request
      - prayer_face_to_face
  contact_message_form:
    required_slots:
      - contact_name
      - contact_email
      - contact_phone
      - contact_subject
      - contact_message
  counseling_confirmation_form:
    required_slots:
      - counseling_continue_confirmation
  testimony_form:
    required_slots:
      - testimony_name
      - testimony_title
      - testimony_category
      - testimony_content
      - testimony_branch
      - testimony_is_member
  devotion_subscribe_form:
    required_slots:
      - devotion_subscriber_email
  counseling_request_form:
    required_slots:
      - counseling_name
      - counseling_contact_number
      - counseling_address
      - counseling_facebook_account
      - counseling_preferred_date
      - counseling_preferred_time
      - counseling_type
      - counseling_is_member
      - counseling_concern
