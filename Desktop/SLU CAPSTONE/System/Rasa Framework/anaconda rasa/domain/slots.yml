version: "3.1"

# ── Slots ──────────────────────────────────────────────────────────────────────
slots:
  # Branch finder flow
  selected_region_id:
    type: float
    mappings:
      - type: custom
  selected_region_name:
    type: text
    mappings:
      - type: custom
  selected_branch_id:
    type: float
    mappings:
      - type: custom

  # Prayer request form
  prayer_name:
    type: text
    mappings:
      - type: from_text
        conditions:
          - active_loop: prayer_form
            requested_slot: prayer_name
  prayer_phone:
    type: text
    mappings:
      - type: from_text
        conditions:
          - active_loop: prayer_form
            requested_slot: prayer_phone
  prayer_address:
    type: text
    mappings:
      - type: from_text
        conditions:
          - active_loop: prayer_form
            requested_slot: prayer_address
  prayer_request:
    type: text
    mappings:
      - type: from_text
        conditions:
          - active_loop: prayer_form
            requested_slot: prayer_request
  prayer_face_to_face:
    type: bool
    mappings:
      - type: from_text
        conditions:
          - active_loop: prayer_form
            requested_slot: prayer_face_to_face

  # Contact message form
  contact_name:
    type: text
    mappings:
      - type: from_text
        conditions:
          - active_loop: contact_message_form
            requested_slot: contact_name
  contact_email:
    type: text
    mappings:
      - type: from_text
        conditions:
          - active_loop: contact_message_form
            requested_slot: contact_email
  contact_phone:
    type: text
    mappings:
      - type: from_text
        conditions:
          - active_loop: contact_message_form
            requested_slot: contact_phone
  contact_subject:
    type: text
    mappings:
      - type: from_text
        conditions:
          - active_loop: contact_message_form
            requested_slot: contact_subject
  contact_message:
    type: text
    mappings:
      - type: from_text
        conditions:
          - active_loop: contact_message_form
            requested_slot: contact_message

  counseling_continue_confirmation:
    type: bool
    mappings:
      - type: from_text
        conditions:
          - active_loop: counseling_confirmation_form
            requested_slot: counseling_continue_confirmation
  counseling_name:
    type: text
    mappings:
      - type: from_text
        conditions:
          - active_loop: counseling_request_form
            requested_slot: counseling_name
  counseling_contact_number:
    type: text
    mappings:
      - type: from_text
        conditions:
          - active_loop: counseling_request_form
            requested_slot: counseling_contact_number
  counseling_address:
    type: text
    mappings:
      - type: from_text
        conditions:
          - active_loop: counseling_request_form
            requested_slot: counseling_address
  counseling_facebook_account:
    type: text
    mappings:
      - type: from_text
        conditions:
          - active_loop: counseling_request_form
            requested_slot: counseling_facebook_account
  counseling_preferred_date:
    type: text
    mappings:
      - type: from_text
        conditions:
          - active_loop: counseling_request_form
            requested_slot: counseling_preferred_date
  counseling_preferred_time:
    type: text
    mappings:
      - type: from_text
        conditions:
          - active_loop: counseling_request_form
            requested_slot: counseling_preferred_time
  counseling_type:
    type: text
    mappings:
      - type: from_text
        conditions:
          - active_loop: counseling_request_form
            requested_slot: counseling_type
  counseling_is_member:
    type: bool
    mappings:
      - type: from_text
        conditions:
          - active_loop: counseling_request_form
            requested_slot: counseling_is_member
  counseling_concern:
    type: text
    mappings:
      - type: from_text
        conditions:
          - active_loop: counseling_request_form
            requested_slot: counseling_concern
  last_contact_topic:
    type: text
    mappings:
      - type: custom

  # Pastor lookup flow
  last_pastor_name:
    type: text
    mappings:
      - type: custom
  last_branch_id:
    type: float
    mappings:
      - type: custom
  last_branch_name:
    type: text
    mappings:
      - type: custom
