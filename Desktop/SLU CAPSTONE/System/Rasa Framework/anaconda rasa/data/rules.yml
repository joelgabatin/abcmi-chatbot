version: "3.1"

rules:

- rule: Say hello when user greets
  steps:
  - intent: greet
  - action: utter_greet

- rule: Say goodbye anytime the user says goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Say 'I am a bot' anytime the user challenges
  steps:
  - intent: bot_challenge
  - action: utter_iamabot

- rule: Answer mission question anytime the user asks
  steps:
  - intent: ask_mission
  - action: action_get_mission

- rule: Answer vision question anytime the user asks
  steps:
  - intent: ask_vision
  - action: action_get_vision

- rule: Answer history question anytime the user asks
  steps:
  - intent: ask_history
  - action: action_get_history

- rule: Answer statement of belief question anytime the user asks
  steps:
  - intent: ask_statement_of_belief
  - action: action_get_statement_of_belief

- rule: Answer driving force question anytime the user asks
  steps:
  - intent: ask_driving_force
  - action: action_get_driving_force

- rule: Answer core values question anytime the user asks
  steps:
  - intent: ask_core_values
  - action: action_get_core_values

- rule: Start branch search when user asks about branches
  steps:
  - intent: ask_branches
  - action: action_get_branches

- rule: Answer total branch count
  steps:
  - intent: ask_total_branches
  - action: action_get_total_branches

- rule: Answer local branches question
  steps:
  - intent: ask_local_branches
  - action: action_get_local_branches

- rule: Answer international branches question
  steps:
  - intent: ask_international_branches
  - action: action_get_international_branches

- rule: Answer who are the pastors
  steps:
  - intent: ask_pastors
  - action: action_get_all_pastors

- rule: Answer specific pastor query
  steps:
  - intent: ask_specific_pastor
  - action: action_find_pastor

- rule: Answer pastor branch schedule follow-up
  steps:
  - intent: ask_pastor_branch_schedule
  - action: action_get_pastor_branch_schedule
