# ── Domain Index ───────────────────────────────────────────────────────────────
#
# This project uses a split domain structure inside the domain/ folder.
# Edit the files there — NOT this file.
#
#   domain/intents.yml              — all intents
#   domain/entities.yml             — all entities
#   domain/slots.yml                — all slots
#   domain/forms.yml                — all forms
#   domain/actions.yml              — all custom actions
#   domain/session_config.yml       — session settings
#   domain/responses/greetings.yml  — greeting/general responses
#   domain/responses/prayer.yml     — prayer responses
#   domain/responses/ministries.yml — ministry responses
#
# Always run Rasa with the --domain flag pointing to the folder:
#
#   rasa train --domain domain/
#   rasa run --enable-api --cors "*"
#   rasa run actions
#
# ──────────────────────────────────────────────────────────────────────────────

version: "3.1"
